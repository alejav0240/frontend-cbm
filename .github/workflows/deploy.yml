name: "CI/CD — Lint, Security Scan & Deploy"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: "Lint (ESLint)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  build:
    name: "Build (Next.js)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  security-scan:
    name: "Security Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Scan — JSON
        run: |
          trivy fs --format json --output trivy-report.json \
            --severity CRITICAL,HIGH,MEDIUM,LOW \
            --scanners vuln,secret,misconfig --exit-code 0 .

      - name: Scan — SARIF
        run: |
          trivy fs --format sarif --output trivy-report.sarif \
            --severity CRITICAL,HIGH,MEDIUM,LOW \
            --scanners vuln,secret,misconfig --exit-code 0 .

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: trivy-report.sarif

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: trivy-frontend-reports
          path: trivy-report.*
          retention-days: 30

  deploy:
    name: "Deploy Frontend"
    runs-on: ubuntu-latest
    needs: [lint, build, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p 22 ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy via SSH
        env:
          SSH_KEY: ~/.ssh/deploy_key
        run: |
          ssh -i ${{ env.SSH_KEY }} -o StrictHostKeyChecking=yes \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash -s << 'DEPLOY_EOF'
            set -ex
            cd ~/cbm-frontend
            git pull origin main
            pnpm install --frozen-lockfile
            pnpm build
            cp -r .next/static .next/standalone/.next/
            cp -r public .next/standalone/
            pm2 restart cbm-frontend
            pm2 save
            echo "Frontend deployed successfully!"
          DEPLOY_EOF
