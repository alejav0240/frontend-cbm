name: "CI/CD — Lint, Security Scan & Deploy"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "9"

jobs:
  lint:
    name: "Lint (ESLint)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  build:
    name: "Build (Next.js)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  security-scan:
    name: "Security Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Scan — JSON
        run: |
          trivy fs --format json --output trivy-report.json \
            --severity CRITICAL,HIGH,MEDIUM,LOW \
            --scanners vuln,secret,misconfig --exit-code 0 .

      - name: Scan — SARIF
        run: |
          trivy fs --format sarif --output trivy-report.sarif \
            --severity CRITICAL,HIGH,MEDIUM,LOW \
            --scanners vuln,secret,misconfig --exit-code 0 .

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: trivy-report.sarif

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: trivy-frontend-reports
          path: trivy-report.*
          retention-days: 30

  deploy:
    name: "Deploy Frontend"
    runs-on: ubuntu-latest
    needs: [lint, build, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            echo "Pulling latest code..."
            cd ~/cbm-frontend
            git pull origin main

            echo "Installing dependencies..."
            pnpm install --frozen-lockfile

            echo "Building Next.js..."
            pnpm build

            echo "Copying static assets to standalone..."
            cp -r .next/static .next/standalone/.next/
            cp -r public .next/standalone/

            echo "Restarting PM2 process..."
            pm2 restart cbm-frontend
            pm2 save

            echo "Frontend deployed successfully!"
